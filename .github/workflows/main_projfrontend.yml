name: Build and deploy Node.js app to Azure Web App - ProjFrontEnd

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x' # Mudei de 24.x (bleeding edge) para 20.x (LTS estável). Pare de usar versões experimentais em produção.

      - name: npm install, build, and test
        working-directory: ./Frontend # Usando o parâmetro correto em vez de dar 'cd' manual
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # O Vite compila a aplicação final para a pasta 'dist'. É SÓ ISSO que nos interessa.
          path: ./Frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./deploy-package # Baixa o artefato isolado em uma pasta limpa
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_228D382AEE804277A42DC32080781723 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DD3367A26AB14EFAA405DA455BF20726 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9548565FFCAB4909A3EF5FF044891140 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Mod2Eng'
          slot-name: 'Production'
          package: ./deploy-package # Faz o deploy apenas do código compilado
